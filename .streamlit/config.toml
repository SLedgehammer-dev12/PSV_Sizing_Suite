[theme]
primaryColor = "#1E88E5"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F8F9FA"
textColor = "#212529"
font = "sans serif"

[server]
headless = true
maxUploadSize = 5
enableXsrfProtection = true
enableCORS = false

[runner]
magicEnabled = false

[logger]
level = "warning"

[browser]
gatherUsageStats = false
